<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Личный кабинет{% endblock %} — Glava</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --cream: #faf8f5; --paper: #f5f2ed; --ink: #2c2419; --accent: #5b7a9e; --muted: #6b5d4d; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Manrope,sans-serif; background: var(--cream); color: var(--ink); line-height: 1.6; min-height: 100vh; }
        .container { max-width: 700px; margin: 0 auto; padding: 2rem 1.5rem; }
        a { color: var(--accent); text-decoration: none; }
        a:hover { text-decoration: underline; }
        .btn { display: inline-block; padding: 0.6rem 1.2rem; background: var(--accent); color: #fff; border-radius: 6px; border: none; cursor: pointer; font-size: 1rem; }
        .btn:hover { opacity: 0.9; }
        .muted { color: var(--muted); font-size: 0.9rem; }
    </style>
    {% block head %}{% endblock %}
</head>
<body>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
