{% extends "base.html" %}
{% block title %}Вход{% endblock %}
{% block content %}
<h1 style="margin-bottom: 1.5rem;">Личный кабинет</h1>
{% if error %}<p style="color: #c00; margin-bottom: 1rem;">{{ error }}</p>{% endif %}
<form method="post" style="max-width: 320px;">
    <p style="margin-bottom: 0.5rem;"><label for="login">Логин ( @username или ID )</label></p>
    <input type="text" id="login" name="login" required autocomplete="username"
           style="width: 100%; padding: 0.6rem; margin-bottom: 1rem; border: 1px solid #ccc; border-radius: 6px;">
    <p style="margin-bottom: 0.5rem;"><label for="password">Пароль</label></p>
    <input type="password" id="password" name="password" required autocomplete="current-password"
           style="width: 100%; padding: 0.6rem; margin-bottom: 1rem; border: 1px solid #ccc; border-radius: 6px;">
    <button type="submit" class="btn">Войти</button>
</form>
<p class="muted" style="margin-top: 1.5rem;">Пароль настраивается в боте: @glava_voice_bot → /cabinet</p>
{% endblock %}
