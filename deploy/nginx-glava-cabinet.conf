# Nginx-конфиг для кабинета Glava (прокси на порт 80).
# Установка: apt install nginx
# Копировать: cp deploy/nginx-glava-cabinet.conf /etc/nginx/sites-available/glava-cabinet
# Активировать: ln -sf /etc/nginx/sites-available/glava-cabinet /etc/nginx/sites-enabled/
# Проверить: nginx -t && systemctl reload nginx

server {
    listen 80 default_server;
    server_name _;
    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
