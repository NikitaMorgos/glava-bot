# Лендинг glava.family
server {
    listen 80;
    server_name glava.family www.glava.family;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name glava.family www.glava.family;

    ssl_certificate     /etc/letsencrypt/live/glava.family/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/glava.family/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    root  /var/www/glava.family;
    index index.html;

    # Кэширование ассетов
    location ~* \.(png|jpg|jpeg|gif|svg|webp|ico|woff2|woff|ttf|css|js)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Редирект www → без www
    if ($host = www.glava.family) {
        return 301 https://glava.family$request_uri;
    }
}
