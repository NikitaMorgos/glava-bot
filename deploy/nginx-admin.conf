# Nginx-конфиг для Admin Panel — admin.glava.family
#
# Установка:
#   sudo cp /opt/glava/deploy/nginx-admin.conf /etc/nginx/sites-available/glava-admin
#   sudo ln -sf /etc/nginx/sites-available/glava-admin /etc/nginx/sites-enabled/
#   sudo certbot --nginx -d admin.glava.family
#   sudo nginx -t && sudo systemctl reload nginx
#
# DNS: добавить A-запись admin.glava.family → 72.56.121.94 в nic.ru

server {
    listen 80;
    server_name admin.glava.family;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name admin.glava.family;

    # SSL (заполняет certbot)
    ssl_certificate     /etc/letsencrypt/live/admin.glava.family/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.glava.family/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Ограничение доступа по IP (опционально — раскомментировать для безопасности)
    # allow 1.2.3.4;    # IP разработчика
    # deny all;

    location / {
        proxy_pass http://127.0.0.1:5001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout 60s;
    }

    # n8n — редактор workflow
    location /n8n/ {
        proxy_pass http://127.0.0.1:5678/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
        proxy_connect_timeout 30s;
    }
}
