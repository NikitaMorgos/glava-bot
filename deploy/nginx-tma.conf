# Nginx-конфиг для Telegram Mini App — app.glava.family
#
# Установка:
#   sudo cp /opt/glava/deploy/nginx-tma.conf /etc/nginx/sites-available/glava-tma
#   sudo ln -sf /etc/nginx/sites-available/glava-tma /etc/nginx/sites-enabled/
#   sudo certbot --nginx -d app.glava.family
#   sudo nginx -t && sudo systemctl reload nginx
#
# DNS: добавить A-запись app.glava.family → 72.56.121.94 в nic.ru

server {
    listen 80;
    server_name app.glava.family;

    # HTTPS редирект (certbot добавит после выпуска сертификата)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name app.glava.family;

    # SSL (заполняет certbot)
    ssl_certificate     /etc/letsencrypt/live/app.glava.family/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.glava.family/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Заголовки для Telegram Mini App (обязателен HTTPS)
    add_header X-Frame-Options "ALLOWALL";
    add_header X-Content-Type-Options nosniff;

    # Статические файлы Mini App (/tma/)
    location / {
        root /opt/glava/tma;
        try_files $uri /index.html;
        add_header Cache-Control "no-cache";
    }

    # API — проксируем на Flask cabinet (порт 5000)
    location /api/tma/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout 30s;
    }
}
