<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Glava — Мой кабинет</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg: var(--tg-theme-bg-color, #ffffff);
      --bg2: var(--tg-theme-secondary-bg-color, #f4f4f5);
      --text: var(--tg-theme-text-color, #1a1a1a);
      --hint: var(--tg-theme-hint-color, #888);
      --link: var(--tg-theme-link-color, #2563eb);
      --btn: var(--tg-theme-button-color, #2563eb);
      --btn-text: var(--tg-theme-button-text-color, #fff);
      --accent: #6366f1;
      --radius: 14px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: env(safe-area-inset-bottom);
    }

    /* ── Экран загрузки ── */
    #screen-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 16px;
      color: var(--hint);
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--bg2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Навигация ── */
    #nav {
      display: none;
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--bg);
      border-top: 1px solid var(--bg2);
      padding: 8px 0 calc(8px + env(safe-area-inset-bottom));
      z-index: 100;
    }
    #nav.visible { display: flex; }
    .nav-tabs {
      display: flex;
      width: 100%;
    }
    .nav-tab {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      padding: 6px 0;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 11px;
      color: var(--hint);
      transition: color 0.15s;
    }
    .nav-tab.active { color: var(--accent); }
    .nav-tab svg { width: 22px; height: 22px; }

    /* ── Контент ── */
    .screen {
      display: none;
      padding: 16px 16px 80px;
    }
    .screen.active { display: block; }

    /* ── Шапка страницы ── */
    .page-header {
      margin-bottom: 20px;
    }
    .page-title {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .page-sub {
      font-size: 14px;
      color: var(--hint);
    }

    /* ── Карточки ── */
    .card {
      background: var(--bg2);
      border-radius: var(--radius);
      padding: 14px 16px;
      margin-bottom: 12px;
    }
    .card-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--hint);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 10px;
    }

    /* ── Стат-блоки ── */
    .stats-row {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
    }
    .stat-card {
      flex: 1;
      background: var(--bg2);
      border-radius: var(--radius);
      padding: 14px;
      text-align: center;
    }
    .stat-num {
      font-size: 28px;
      font-weight: 700;
      color: var(--accent);
    }
    .stat-label {
      font-size: 12px;
      color: var(--hint);
      margin-top: 2px;
    }

    /* ── Список файлов ── */
    .file-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid rgba(0,0,0,0.06);
    }
    .file-item:last-child { border-bottom: none; }
    .file-icon {
      width: 40px; height: 40px;
      border-radius: 10px;
      background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      color: white;
      font-size: 18px;
    }
    .file-icon.photo { background: #10b981; }
    .file-info { flex: 1; min-width: 0; }
    .file-name {
      font-size: 14px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .file-meta {
      font-size: 12px;
      color: var(--hint);
      margin-top: 2px;
    }
    .file-link {
      color: var(--link);
      font-size: 13px;
      text-decoration: none;
      flex-shrink: 0;
      padding: 6px 10px;
      background: var(--bg);
      border-radius: 8px;
    }

    /* ── Биография ── */
    .bio-text {
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
      color: var(--text);
    }
    .bio-empty {
      color: var(--hint);
      font-size: 14px;
      text-align: center;
      padding: 24px 0;
    }

    /* ── Вопросы ── */
    .q-block {
      margin-bottom: 8px;
      border-radius: var(--radius);
      background: var(--bg2);
      overflow: hidden;
    }
    .q-block-header {
      padding: 14px 16px;
      font-weight: 600;
      font-size: 15px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      user-select: none;
    }
    .q-block-header .chevron {
      transition: transform 0.2s;
      color: var(--hint);
    }
    .q-block.open .chevron { transform: rotate(180deg); }
    .q-block-body {
      display: none;
      padding: 0 16px 14px;
    }
    .q-block.open .q-block-body { display: block; }
    .q-item {
      font-size: 14px;
      line-height: 1.5;
      padding: 7px 0;
      border-bottom: 1px solid rgba(0,0,0,0.06);
      color: var(--text);
    }
    .q-item:last-child { border-bottom: none; }

    /* ── Ошибка ── */
    #screen-error {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 12px;
      padding: 24px;
      text-align: center;
    }
    #screen-error.active { display: flex; }
    .error-icon { font-size: 48px; }
    .error-title { font-size: 18px; font-weight: 600; }
    .error-msg { font-size: 14px; color: var(--hint); }
  </style>
</head>
<body>

<!-- Загрузка -->
<div id="screen-loading">
  <div class="spinner"></div>
  <span>Загрузка...</span>
</div>

<!-- Ошибка -->
<div id="screen-error">
  <div class="error-icon">😔</div>
  <div class="error-title">Не удалось загрузить</div>
  <div class="error-msg" id="error-msg">Попробуйте открыть кабинет снова</div>
</div>

<!-- Главная -->
<div id="screen-home" class="screen">
  <div class="page-header">
    <div class="page-title" id="home-greeting">Мой кабинет</div>
    <div class="page-sub">Ваши материалы для книги</div>
  </div>
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-num" id="stat-voices">—</div>
      <div class="stat-label">Голосовых</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="stat-photos">—</div>
      <div class="stat-label">Фото</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="stat-bio">—</div>
      <div class="stat-label">Биография</div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">Голосовые записи</div>
    <div id="voices-list"><div class="bio-empty">Загрузка...</div></div>
  </div>
  <div class="card">
    <div class="card-title">Фотографии</div>
    <div id="photos-list"><div class="bio-empty">Загрузка...</div></div>
  </div>
</div>

<!-- Биография -->
<div id="screen-bio" class="screen">
  <div class="page-header">
    <div class="page-title">Биография</div>
    <div class="page-sub">Сгенерировано на основе ваших записей</div>
  </div>
  <div class="card">
    <div id="bio-content"><div class="bio-empty">Загрузка...</div></div>
  </div>
</div>

<!-- Вопросы -->
<div id="screen-questions" class="screen">
  <div class="page-header">
    <div class="page-title">Вопросы</div>
    <div class="page-sub">Темы для интервью с близкими</div>
  </div>
  <div id="questions-list"></div>
</div>

<!-- Навигация -->
<nav id="nav">
  <div class="nav-tabs">
    <button class="nav-tab active" data-screen="home" onclick="showScreen('home')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      Материалы
    </button>
    <button class="nav-tab" data-screen="bio" onclick="showScreen('bio')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="16" y1="13" x2="8" y2="13"/>
        <line x1="16" y1="17" x2="8" y2="17"/>
      </svg>
      Биография
    </button>
    <button class="nav-tab" data-screen="questions" onclick="showScreen('questions')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3"/>
        <line x1="12" y1="17" x2="12.01" y2="17"/>
      </svg>
      Вопросы
    </button>
  </div>
</nav>

<script>
  const tg = window.Telegram.WebApp;
  tg.ready();
  tg.expand();

  // Тема из Telegram
  document.documentElement.style.setProperty('--bg', tg.themeParams.bg_color || '#ffffff');

  const API_BASE = '';  // Относительный путь — TMA и API на одном домене

  let authToken = null;
  let dashData = null;

  // ── Авторизация ──
  async function init() {
    try {
      const initData = tg.initData;
      if (!initData) {
        // В браузере (не в Telegram) — показываем ошибку
        showError('Откройте кабинет через Telegram-бота @glava_voice_bot');
        return;
      }

      const res = await fetch('/api/tma/auth', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ init_data: initData }),
      });

      if (!res.ok) {
        showError('Ошибка авторизации. Попробуйте снова.');
        return;
      }

      const data = await res.json();
      authToken = data.token;
      const user = data.user;

      // Приветствие
      const firstName = user.first_name || user.username || 'Привет';
      document.getElementById('home-greeting').textContent = `Привет, ${firstName}`;

      // Загружаем данные
      await loadDashboard();
      await loadQuestions();

      // Показываем интерфейс
      document.getElementById('screen-loading').style.display = 'none';
      document.getElementById('nav').classList.add('visible');
      showScreen('home');

    } catch (e) {
      showError('Не удалось подключиться к серверу');
    }
  }

  // ── Дашборд ──
  async function loadDashboard() {
    const res = await fetch('/api/tma/dashboard', {
      headers: { 'Authorization': `Bearer ${authToken}` },
    });
    if (!res.ok) return;
    dashData = await res.json();

    // Статистика
    document.getElementById('stat-voices').textContent = dashData.voices_count ?? 0;
    document.getElementById('stat-photos').textContent = dashData.photos_count ?? 0;
    document.getElementById('stat-bio').textContent = dashData.bio ? '✓' : '—';

    // Голосовые
    const voicesList = document.getElementById('voices-list');
    if (dashData.voices && dashData.voices.length > 0) {
      voicesList.innerHTML = dashData.voices.map((v, i) => {
        const date = v.created_at ? new Date(v.created_at).toLocaleDateString('ru-RU') : '';
        const dur = v.duration ? `${v.duration} сек` : '';
        return `<div class="file-item">
          <div class="file-icon">🎙</div>
          <div class="file-info">
            <div class="file-name">Запись ${i + 1}</div>
            <div class="file-meta">${[date, dur].filter(Boolean).join(' · ')}</div>
          </div>
          ${v.download_url ? `<a class="file-link" href="${v.download_url}" target="_blank">Слушать</a>` : ''}
        </div>`;
      }).join('');
    } else {
      voicesList.innerHTML = '<div class="bio-empty">Голосовых записей пока нет</div>';
    }

    // Фото
    const photosList = document.getElementById('photos-list');
    if (dashData.photos && dashData.photos.length > 0) {
      photosList.innerHTML = dashData.photos.map((p, i) => {
        const cap = p.caption ? p.caption.slice(0, 60) : `Фото ${i + 1}`;
        return `<div class="file-item">
          <div class="file-icon photo">🖼</div>
          <div class="file-info">
            <div class="file-name">${cap}</div>
          </div>
          ${p.download_url ? `<a class="file-link" href="${p.download_url}" target="_blank">Открыть</a>` : ''}
        </div>`;
      }).join('');
    } else {
      photosList.innerHTML = '<div class="bio-empty">Фотографий пока нет</div>';
    }

    // Биография
    const bioContent = document.getElementById('bio-content');
    if (dashData.bio) {
      // Показываем последний блок биографии
      const lastBlock = dashData.bio.split('---').pop().trim();
      bioContent.innerHTML = `<div class="bio-text">${escHtml(lastBlock)}</div>`;
    } else {
      bioContent.innerHTML = '<div class="bio-empty">Биография будет здесь после обработки ваших записей</div>';
    }
  }

  // ── Вопросы ──
  async function loadQuestions() {
    const res = await fetch('/api/tma/questions', {
      headers: { 'Authorization': `Bearer ${authToken}` },
    });
    if (!res.ok) return;
    const data = await res.json();

    const list = document.getElementById('questions-list');
    list.innerHTML = data.blocks.map((block, bi) => `
      <div class="q-block" id="qb-${bi}">
        <div class="q-block-header" onclick="toggleBlock(${bi})">
          <span>${block.title}</span>
          <span class="chevron">▾</span>
        </div>
        <div class="q-block-body">
          ${block.questions.map(q => `<div class="q-item">${escHtml(q)}</div>`).join('')}
        </div>
      </div>
    `).join('');
  }

  // ── Навигация ──
  function showScreen(name) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    document.getElementById(`screen-${name}`).classList.add('active');
    document.querySelector(`.nav-tab[data-screen="${name}"]`).classList.add('active');
    window.scrollTo(0, 0);
  }

  function toggleBlock(bi) {
    document.getElementById(`qb-${bi}`).classList.toggle('open');
  }

  function showError(msg) {
    document.getElementById('screen-loading').style.display = 'none';
    document.getElementById('error-msg').textContent = msg;
    document.getElementById('screen-error').classList.add('active');
  }

  function escHtml(str) {
    return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  init();
</script>
</body>
</html>
