{% extends "base.html" %}
{% block title %}Новая рассылка — GLAVA Admin{% endblock %}
{% block content %}

<div class="flex items-center gap-3 mb-6">
  <a href="/lena/mailings" class="text-gray-400 hover:text-gray-700">← Назад</a>
  <h1 class="text-2xl font-bold text-gray-900">Новая рассылка</h1>
</div>

<form method="POST" class="max-w-2xl">
  <div class="bg-white rounded-xl shadow-sm p-6 space-y-5">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Название (для истории)</label>
      <input name="name" type="text" placeholder="Например: Напоминание неактивным"
        class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-gray-900">
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Сегмент получателей</label>
      <select name="segment"
        class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-gray-900">
        {% for seg_id, seg_name in segments %}
        <option value="{{ seg_id }}">{{ seg_name }}</option>
        {% endfor %}
      </select>
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Текст сообщения</label>
      <div class="text-xs text-gray-400 mb-1">Поддерживает HTML: &lt;b&gt;жирный&lt;/b&gt;, &lt;i&gt;курсив&lt;/i&gt;, &lt;a href="..."&gt;ссылка&lt;/a&gt;</div>
      <textarea name="template_text" rows="8" required
        placeholder="Привет! Мы хотели напомнить, что ваша семейная история ждёт..."
        class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm font-mono focus:outline-none focus:ring-2 focus:ring-gray-900 resize-y"></textarea>
    </div>

    <div class="flex gap-3 pt-2">
      <button type="submit" name="send_now" value="1"
        class="px-5 py-2 bg-gray-900 text-white rounded-lg text-sm font-medium hover:bg-gray-700 transition-colors">
        📨 Отправить сейчас
      </button>
      <button type="submit"
        class="px-5 py-2 border border-gray-200 text-gray-600 rounded-lg text-sm hover:bg-gray-50 transition-colors">
        💾 Сохранить черновик
      </button>
      <a href="/lena/mailings" class="px-5 py-2 text-gray-400 rounded-lg text-sm hover:text-gray-700 transition-colors">
        Отмена
      </a>
    </div>
  </div>
</form>
{% endblock %}
