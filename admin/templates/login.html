<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>GLAVA Admin — Вход</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 min-h-screen flex items-center justify-center">
  <div class="bg-white rounded-2xl shadow-xl p-8 w-full max-w-sm">
    <div class="text-center mb-6">
      <div class="text-3xl font-bold text-gray-900">GLAVA</div>
      <div class="text-sm text-gray-500 mt-1">Панель управления</div>
    </div>

    {% if error %}
    <div class="mb-4 px-4 py-3 bg-red-50 text-red-700 rounded-lg text-sm">{{ error }}</div>
    {% endif %}

    <form method="POST" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Логин</label>
        <input name="username" type="text" required autofocus
          class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-gray-900">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Пароль</label>
        <input name="password" type="password" required
          class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-gray-900">
      </div>
      <button type="submit"
        class="w-full py-2 px-4 bg-gray-900 text-white rounded-lg font-medium text-sm hover:bg-gray-700 transition-colors">
        Войти
      </button>
    </form>
  </div>
</body>
</html>
