{% extends "base.html" %}
{% block title %}Отчёты — GLAVA Admin{% endblock %}
{% block content %}

<h1 class="text-2xl font-bold text-gray-900 mb-6">📈 Отчёты</h1>

<div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
  {% for status, count in stats.by_status.items() %}
  <div class="bg-white rounded-xl shadow-sm p-4 text-center">
    <div class="text-3xl font-bold text-gray-800">{{ count }}</div>
    <div class="text-sm text-gray-500 mt-1">{{ status }}</div>
  </div>
  {% endfor %}
  <div class="bg-white rounded-xl shadow-sm p-4 text-center">
    <div class="text-3xl font-bold text-gray-800">{{ stats.avg_hours }}</div>
    <div class="text-sm text-gray-500 mt-1">ср. часов на книгу</div>
  </div>
</div>
{% endblock %}
